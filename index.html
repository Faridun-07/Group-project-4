<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="bg-[#F6F7FB] lg:p-[5px_0] p-[5px_15px]">
   <header class="max-w-300 m-auto flex justify-between items-center hidden lg:flex">
    <nav class="flex gap-[30px]">
        <p class="text-[14px]">О компании</p>
        <p class="text-[14px]">Доставка и оплата</p>
        <p class="text-[14px]">Гарантии</p>
        <p class="text-[14px]">Контакты</p>
    </nav>
    <div class="flex gap-[30px] items-center">
        <p class="text-[14px] font-medium flex items-center gap-[5px]"><i class="fa-solid fa-phone" style="color: rgb(0, 0, 0);"></i> +7 (965) 237-44-49</p>
        <select class="text-[14px]">
            <option class="bg-[red]  text-[white]">Русский</option>
            <option>English</option>
            <option class="text-[white] bg-[green]">TJK</option>
        </select>
        <p class="text-[14px]">Личный кабинет</p>
    </div>
   </header>
   </div>
   <header class=" max-w-300 m-auto flex flex-col gap-[50px] p-[20px_15px] lg:pb-[20px] lg:pt-[50px] lg:px-0">
    <div class="flex justify-between lg:items-center">
        <img src="./src/Faridunimg/logoF.png" alt="">
        <div class="flex">
            <input class=" hidden lg:flex w-[600px] outline-none pl-[15px]  border-[2px] border-[#399A3A] rounded-tl-[5px] rounded-bl-[5px] border-r-0" type="text" placeholder="Введите поисковой запрос..">
            <button class="hidden lg:flex bg-[#399A3A] text-white font-medium p-[8px_20px] rounded-tr-[5px] rounded-br-[5px]"><i class="fa-solid fa-magnifying-glass" style="color:white;"></i> Найти</button>
            </div>
            <div class="flex flex-col items-center gap-[10px] hidden lg:flex">
                <i class="fa-regular fa-heart" style="color: rgb(0, 0, 0); font-size: 25px;"></i>
                <p class="text-[14px]">Избранное</p>
            </div>
            <div class="flex flex-col items-center gap-[10px] hidden lg:flex">
                <i class="fa-solid fa-cart-shopping" style="color: rgb(0, 0, 0); font-size: 25px;"></i>
                <p class="text-[14px]">Моя корзина</p>
            </div>
            <p class="lg:hidden"><i class="fa-solid fa-bars" style="color: rgb(0, 0, 0); font-size: 20px;"></i></p>
    </div>
    <div class="flex flex-col gap-[10px] lg:justify-between lg:flex-row lg:items-center">
        <nav class="flex flex-col gap-[10px] lg:flex-row  lg:gap-[70px]">
            <p class="font-medium flex items-baseline gap-[1px]">Apple <i class="fa-solid fa-angle-down" style="color: rgb(0, 0, 0); font-size: 12px;"></i></p>
            <p class="font-medium flex items-baseline gap-[1px]">Huawei <i class="fa-solid fa-angle-down" style="color: rgb(0, 0, 0); font-size: 12px;"></i></p>
            <p class="font-medium flex items-baseline gap-[1px]">Xiaomi <i class="fa-solid fa-angle-down" style="color: rgb(0, 0, 0); font-size: 12px;"></i></p>
            <p class="font-medium flex items-baseline gap-[1px]">Samsung <i class="fa-solid fa-angle-down" style="color: rgb(0, 0, 0); font-size: 12px;"></i></p>
            <p class="font-medium">Питание и кабели</p>
            <p class="font-medium">Powerbank</p>
            <p class="font-medium">Акции</p>
        </nav>
        <p class="font-medium text-[#399A3A]">Прайс-лист</p>
    </div>
   </header>
   <hr class="border-[2px] border-[#F6F7FB]">
   <main></main>
   <footer></footer>

</html>
